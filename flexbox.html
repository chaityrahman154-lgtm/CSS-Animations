<!--Flexbox
To add margin between each of the icons we can use margin-right
We can change flex-drection: column, row-reverse, column-reverse
justify-content property sets the alignment on the main axis
we can set it to flex-end, center, space-between, space-around, space-evenly
To access cross section, we need align-items: center, flex-end, baseline
We can use align-self: center, end in any one of the boxes
but we need to eliminate flex-wrap and align-content, they are connected
or we can use order: 1(that box will be at the end), -1(at the beginning)-->
